<!doctype html>
<html><head><meta charset="utf-8" /><title>Project Redirect</title></head>
<body>
<script>
  const id = new URLSearchParams(window.location.search).get('id');
  const target = id ? `/projects/${encodeURIComponent(id)}/` : '/projects/';
  window.location.replace(target);
</script>
<p>Redirecting to projects…</p>
</body></html>
